name: 自定义镜像构建

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: 自定义镜像标签，例如 claw-fix
        required: true
        default: claw-fix
        type: string
      sync_latest:
        description: 是否同时推送 latest 标签
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    name: 构建并推送
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成镜像标签
        id: meta
        shell: bash
        run: |
          OWNER_LOWER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO_LOWER="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LOWER}/${REPO_LOWER}"
          TAG_INPUT="${{ github.event.inputs.image_tag }}"
          if [ -z "${TAG_INPUT}" ]; then
            TAG_INPUT="main-${GITHUB_SHA::7}"
          fi

          {
            echo "image=${IMAGE}"
            echo "primary_tag=${IMAGE}:${TAG_INPUT}"
          } >> "${GITHUB_OUTPUT}"

          SYNC_LATEST="${{ github.event.inputs.sync_latest }}"
          if [ -z "${SYNC_LATEST}" ]; then
            SYNC_LATEST="true"
          fi
          if [ "${SYNC_LATEST}" = "true" ]; then
            {
              echo 'tags<<EOF'
              echo "${IMAGE}:${TAG_INPUT}"
              echo "${IMAGE}:latest"
              echo 'EOF'
            } >> "${GITHUB_OUTPUT}"
          else
            {
              echo 'tags<<EOF'
              echo "${IMAGE}:${TAG_INPUT}"
              echo 'EOF'
            } >> "${GITHUB_OUTPUT}"
          fi

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GOPROXY=https://proxy.golang.org,direct
            GOSUMDB=sum.golang.org

      - name: 输出结果
        shell: bash
        run: |
          echo "已推送镜像：${{ steps.meta.outputs.primary_tag }}"
          SYNC_LATEST="${{ github.event.inputs.sync_latest }}"
          if [ -z "${SYNC_LATEST}" ]; then
            SYNC_LATEST="true"
          fi
          if [ "${SYNC_LATEST}" = "true" ]; then
            echo "附加标签：${{ steps.meta.outputs.image }}:latest"
          fi
